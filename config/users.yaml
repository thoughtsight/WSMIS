# Location Permission Matrix
location_permissions:
  all:
    admin: true
    regional_manager: false
    location_manager: false
    service_advisor: false
    viewer: false
  
  assigned:
    admin: true
    regional_manager: true
    location_manager: true
    service_advisor: true
    viewer: true

# Session Configuration
session:
  timeout_minutes: 30
  warning_minutes: 5
  auto_logout: true

# Route Configuration
routes:
  # Public routes (no authentication required)
  public:
    - "/"
    - "/login"
    - "/logout"
  
  # Admin routes (admin role required)
  admin:
    - "/admin"
    - "/admin/users"
    - "/admin/roles"
    - "/admin/audit"
  
  # Protected routes (authentication required)
  protected:
    - "/Cockpit"
    - "/Overview"
    - "/Advisors"
    - "/Advisor MoM"
    - "/Locations"
    - "/Trends"
    - "/Targets"
    - "/Margin"
    - "/Discounts"
    - "/Leakage Center"
    - "/Sales Mix"
    - "/Internal Audit"
    - "/Executive"
