# WSMIS User Configuration
# Role-Based Access Control (RBAC) Foundation
# Version: 1.0.0

# User Definitions
users:
  # Admin User - Full Access
  admin:
    name: "Administrator"
    email: "admin@wsmis.com"
    role: "admin"
    locations: ["all"]
    active: true
  
  # Regional Manager - Multi-Location Access
  regional_manager:
    name: "Regional Manager"
    email: "regional@wsmis.com"
    role: "regional_manager"
    locations: ["Indore", "Bhopal", "Jabalpur"]
    active: true
  
  # Location Manager - Single Location Access
  location_manager:
    name: "Location Manager"
    email: "manager@wsmis.com"
    role: "location_manager"
    locations: ["Indore"]
    active: true
  
  # Service Advisor - Limited Access
  service_advisor:
    name: "Service Advisor"
    email: "advisor@wsmis.com"
    role: "service_advisor"
    locations: ["Indore"]
    active: true
  
  # Viewer - Read-Only Access
  viewer:
    name: "Viewer"
    email: "viewer@wsmis.com"
    role: "viewer"
    locations: ["Indore"]
    active: true

# Role Definitions
roles:
  admin:
    # Full access to all dashboards
    dashboards: ["all"]
    # Can access admin routes
    admin_access: true
    # Can export data
    export_access: true
    # Can view all locations
    location_access: "all"
  
  regional_manager:
    # Access to operational dashboards
    dashboards: ["Cockpit", "Overview", "Advisors", "Advisor MoM", "Locations", "Trends", "Targets"]
    # No admin access
    admin_access: false
    # Can export data
    export_access: true
    # Limited to assigned locations
    location_access: "assigned"
  
  location_manager:
    # Access to location-specific dashboards
    dashboards: ["Cockpit", "Overview", "Advisors", "Advisor MoM", "Locations", "Trends", "Targets"]
    # No admin access
    admin_access: false
    # Can export data
    export_access: true
    # Limited to assigned location
    location_access: "assigned"
  
  service_advisor:
    # Access to advisor-specific dashboards
    dashboards: ["Advisors", "Advisor MoM"]
    # No admin access
    admin_access: false
    # Limited export access
    export_access: false
    # Limited to assigned location
    location_access: "assigned"
  
  viewer:
    # Read-only access to overview dashboards
    dashboards: ["Cockpit", "Overview"]
    # No admin access
    admin_access: false
    # No export access
    export_access: false
    # Limited to assigned location
    location_access: "assigned"

